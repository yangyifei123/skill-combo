# Example Combo: Content Creation Pipeline
# Demonstrates a chain combo using skills that exist in the base registry

combo:
  name: research-report
  description: "Content research followed by humanized writing"
  type: chain
  execution: serial
  skills:
    - content-research-writer
    - humanizer
  schema:
    input:
      topic: "The research topic"
    output:
      report: "Final humanized markdown report"
