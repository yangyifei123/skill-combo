name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: Brief description of the feature
    validations:
      required: true
  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem or Motivation
      description: What problem does this solve? Why is this needed?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should this be implemented?
    validations:
      required: true
