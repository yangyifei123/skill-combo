name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
            HEAD_REF="${{ github.event.pull_request.head.sha }}"
            git diff --no-color "$BASE_REF..$HEAD_REF" > /tmp/changes.diff
          else
            git diff --no-color HEAD~1 HEAD > /tmp/changes.diff
          fi
          
          LINES=$(wc -l < /tmp/changes.diff)
          echo "lines_changed=$LINES" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "$BASE_REF..$HEAD_REF" > /tmp/changed_files.txt
          else
            git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt
          fi
          echo "files_changed=$(cat /tmp/changed_files.txt | wc -l)" >> $GITHUB_OUTPUT

      - name: Check for API key
        id: check-key
        run: |
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "has_api_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_api_key=false" >> $GITHUB_OUTPUT
          fi

      - name: Run AI Code Review (Basic)
        if: steps.check-key.outputs.has_api_key == 'false'
        id: review-basic
        run: |
          echo "Running basic pattern-based code review..."
          
          REVIEW_BODY=""
          FILES=$(cat /tmp/changed_files.txt)
          
          for file in $FILES; do
            if [ -f "$file" ]; then
              ISSUES=""
              
              # Check console.log
              if grep -q "console.log" "$file" 2>/dev/null; then
                ISSUES="$ISSUES- ⚠️ Found \`console.log\` - consider removing for production\n"
              fi
              
              # Check console.error
              if grep -q "console.error" "$file" 2>/dev/null; then
                ISSUES="$ISSUES- ℹ️ Found \`console.error\` - ensure proper logging\n"
              fi
              
              # Check TODO
              if grep -q "TODO\|FIXME\|XXX" "$file" 2>/dev/null; then
                ISSUES="$ISSUES- 📝 Found TODO/FIXME comments\n"
              fi
              
              # Check long lines
              LONG_LINES=$(awk 'length > 120' "$file" | wc -l)
              if [ "$LONG_LINES" -gt 0 ]; then
                ISSUES="$ISSUES- ✂️ Found $LONG_LINES lines over 120 characters\n"
              fi
              
              # Check hardcoded credentials
              if grep -qiE "password|secret|api_key|apikey|token" "$file" 2>/dev/null; then
                if ! grep -q "process.env" "$file" 2>/dev/null; then
                  ISSUES="$ISSUES- 🔒 Potential hardcoded credentials\n"
                fi
              fi
              
              # Check empty catch
              if grep -qE "catch\s*\{[\s]*\}" "$file" 2>/dev/null; then
                ISSUES="$ISSUES- ⚠️ Empty catch block\n"
              fi
              
              # Check TypeScript any
              if grep -q ": any" "$file" 2>/dev/null; then
                ISSUES="$ISSUES- ℹ️ Found \`any\` type - use specific types\n"
              fi
              
              if [ -n "$ISSUES" ]; then
                REVIEW_BODY="$REVIEW_BODY\n### 📄 $file\n$ISSUES"
              fi
            fi
          done
          
          if [ -z "$REVIEW_BODY" ]; then
            REVIEW_BODY="## ✅ Code Review Complete\n\nNo common issues found."
          else
            REVIEW_BODY="## 🔍 AI Code Review\n\n$REVIEW_BODY\n\n---\n*Automated pattern-based review*"
          fi
          
          echo "$REVIEW_BODY" > /tmp/review_body.md
          cat /tmp/review_body.md

      - name: Run AI Code Review (OpenAI)
        if: steps.check-key.outputs.has_api_key == 'true'
        id: review-ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Running AI review with OpenAI..."
          
          DIFF=$(cat /tmp/changes.diff)
          FILES=$(cat /tmp/changed_files.txt)
          
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a code review assistant. Review code changes and provide feedback on security, bugs, performance, style. Be concise.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Files:\\n$FILES\\n\\nDiff:\\n$DIFF\"
                }
              ],
              \"max_tokens\": 2000
            }")
          
          REVIEW_BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content' 2>/dev/null)
          
          if [ -z "$REVIEW_BODY" ] || [ "$REVIEW_BODY" = "null" ]; then
            REVIEW_BODY="## ❌ AI Review Failed"
          else
            REVIEW_BODY="## 🤖 AI Code Review\n\n$REVIEW_BODY\n\n---\n*Powered by OpenAI*"
          fi
          
          echo "$REVIEW_BODY" > /tmp/review_body.md

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEW_BODY=$(cat /tmp/review_body.md)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$REVIEW_BODY"
          fi